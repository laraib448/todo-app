<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { text-align: center; color: #333; }
        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .task {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-title {
            cursor: pointer;
            flex: 1;
        }
        .completed {
            text-decoration: line-through;
            color: #888;
        }
        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .status {
            padding: 2px 8px;
            border-radius: 3px;
            color: white;
            font-size: 11px;
            margin: 0 5px;
        }
        .pending { background: #ff9800; }
        .completed-status { background: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 To-Do App</h1>
        <div>
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        <div id="taskList"></div>
    </div>

    <!-- Link to external script -->
    <script src="script.js"></script>
</body>
</html>
